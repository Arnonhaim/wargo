<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — WARGO</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;800&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Heebo',sans-serif; background:#060D1B; color:#fff; min-height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; padding:20px; }
    .container { max-width:480px; }
    .code { font-family:'Poppins',sans-serif; font-size:120px; font-weight:800; background:linear-gradient(135deg,#00B4D8,#ff7620); -webkit-background-clip:text; -webkit-text-fill-color:transparent; line-height:1; }
    .title { font-size:24px; font-weight:700; margin:16px 0 12px; }
    .desc { font-size:16px; color:rgba(255,255,255,0.5); margin-bottom:32px; line-height:1.6; }
    .btn { display:inline-block; padding:14px 36px; background:linear-gradient(135deg,#00B4D8,#0891B2); color:#fff; text-decoration:none; border-radius:12px; font-weight:700; font-size:16px; transition:transform 0.2s; }
    .btn:hover { transform:translateY(-2px); }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <div class="title">הדף לא נמצא</div>
    <p class="desc">נראה שהגעת לכתובת שלא קיימת. אולי הדף הוסר או שהכתובת שגויה.</p>
    <a href="/" class="btn">חזרה לדף הראשי</a>
  </div>
</body>
</html>
