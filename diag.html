<!DOCTYPE html>
<html dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>WARGO Diagnostics</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    body { font-family: monospace; background: #0a0f1e; color: #e8ecf4; padding: 30px; direction: ltr; }
    .test { margin: 10px 0; padding: 12px; border-radius: 8px; border: 1px solid #333; }
    .pass { border-color: #22c55e; background: rgba(34,197,94,0.1); }
    .fail { border-color: #ef4444; background: rgba(239,68,68,0.1); }
    .warn { border-color: #f59e0b; background: rgba(245,158,11,0.1); }
    .info { border-color: #3b82f6; background: rgba(59,130,246,0.1); }
    h1 { color: #00b4d8; }
    pre { white-space: pre-wrap; word-break: break-all; font-size: 12px; max-height: 300px; overflow: auto; background: #111; padding: 10px; border-radius: 6px; }
    button { background: #00b4d8; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; margin: 5px; }
  </style>
</head>
<body>
  <h1>WARGO — System Diagnostics</h1>
  <div id="results"></div>
  <hr style="border-color:#333;margin:20px 0;">
  <button onclick="runAll()">Run All Tests</button>
  <button onclick="testSave()">Test Save</button>
  <button onclick="showStoredData()">Show Stored Data</button>

<script>
const SUPABASE_URL = 'https://yrtrwhiootynxkebkpme.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlydHJ3aGlvb3R5bnhrZWJrcG1lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzMjI0MDksImV4cCI6MjA4Njg5ODQwOX0.xItePKvEmrVWdrgQZoHy3pBC2D6bLJHN0Nz7oA-Ty80';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const R = document.getElementById('results');

function log(title, status, detail) {
  R.innerHTML += '<div class="test ' + status + '"><b>' + (status === 'pass' ? '✅' : status === 'fail' ? '❌' : status === 'warn' ? '⚠️' : 'ℹ️') + ' ' + title + '</b><br>' + detail + '</div>';
}

async function runAll() {
  R.innerHTML = '';

  // Test 1: Supabase connection
  log('Test 1: Supabase Connection', 'info', 'Connecting to ' + SUPABASE_URL + '...');
  try {
    const { data, error } = await sb.from('site_content').select('id').limit(1);
    if (error) {
      log('Test 1 Result', 'fail', 'Table site_content error: ' + JSON.stringify(error));
    } else {
      log('Test 1 Result', 'pass', 'Connected! site_content table exists. Rows: ' + (data ? data.length : 0));
    }
  } catch(e) {
    log('Test 1 Result', 'fail', 'Connection failed: ' + e.message);
  }

  // Test 2: Read site_content row id=1
  log('Test 2: Read site_content (id=1)', 'info', 'Fetching...');
  try {
    const { data, error } = await sb.from('site_content').select('*').eq('id', 1).single();
    if (error) {
      log('Test 2 Result', 'fail', 'Error reading row: ' + JSON.stringify(error));
    } else if (!data) {
      log('Test 2 Result', 'fail', 'No row with id=1 found! Admin needs to save at least once.');
    } else {
      const d = data.data;
      const keys = d ? Object.keys(d) : [];
      log('Test 2 Result', 'pass', 'Row found! Data keys: ' + keys.length);

      // Show typo keys
      const typoKeys = keys.filter(k => k.startsWith('typo.'));
      log('Typography keys in DB', typoKeys.length > 0 ? 'pass' : 'warn',
        typoKeys.length > 0 ? 'Found ' + typoKeys.length + ' typo keys:<br>' + typoKeys.join(', ') : 'No typography keys saved yet!');

      // Show hero keys
      const heroKeys = keys.filter(k => k.startsWith('hero.'));
      log('Hero keys in DB', heroKeys.length > 0 ? 'pass' : 'warn',
        heroKeys.length > 0 ? heroKeys.map(k => k + ' = "' + d[k] + '"').join('<br>') : 'No hero keys!');

      // Show all data
      log('Full stored data', 'info', '<pre>' + JSON.stringify(d, null, 2) + '</pre>');
    }
  } catch(e) {
    log('Test 2 Result', 'fail', 'Error: ' + e.message);
  }

  // Test 3: Check RPC save_site_content exists
  log('Test 3: RPC save_site_content', 'info', 'Testing...');
  try {
    // Try calling with dummy admin_id to see if function exists
    const { data, error } = await sb.rpc('save_site_content', {
      admin_id: '00000000-0000-0000-0000-000000000000',
      content: { test: true }
    });
    if (error) {
      if (error.message.includes('not found') || error.message.includes('does not exist') || error.code === '42883') {
        log('Test 3 Result', 'fail', 'RPC function save_site_content DOES NOT EXIST! You need to run the SQL.<br>Error: ' + error.message);
      } else if (error.message.includes('not authorized') || error.message.includes('admin')) {
        log('Test 3 Result', 'pass', 'RPC exists! (Got auth error which is expected with dummy ID)<br>' + error.message);
      } else {
        log('Test 3 Result', 'warn', 'RPC returned error: ' + JSON.stringify(error));
      }
    } else {
      log('Test 3 Result', 'pass', 'RPC works! Response: ' + JSON.stringify(data));
    }
  } catch(e) {
    log('Test 3 Result', 'fail', 'RPC call failed: ' + e.message);
  }

  // Test 4: Check web_admin_users table
  log('Test 4: web_admin_users table', 'info', 'Checking...');
  try {
    const { data, error } = await sb.from('web_admin_users').select('id, email').limit(5);
    if (error) {
      log('Test 4 Result', 'fail', 'Error: ' + JSON.stringify(error));
    } else {
      log('Test 4 Result', data && data.length > 0 ? 'pass' : 'warn',
        data && data.length > 0 ? 'Found ' + data.length + ' admin(s): ' + data.map(a => a.email).join(', ') : 'No admins found!');
    }
  } catch(e) {
    log('Test 4 Result', 'fail', 'Error: ' + e.message);
  }

  // Test 5: Check support_tickets table
  log('Test 5: support_tickets table', 'info', 'Checking...');
  try {
    const { data, error } = await sb.from('support_tickets').select('id').limit(1);
    if (error) {
      log('Test 5 Result', 'warn', 'Table may not exist: ' + error.message);
    } else {
      log('Test 5 Result', 'pass', 'Table exists!');
    }
  } catch(e) {
    log('Test 5 Result', 'warn', 'Error: ' + e.message);
  }

  // Test 6: localStorage check
  try {
    const raw = window.localStorage.getItem('wargo_admin_data');
    if (raw) {
      const d = JSON.parse(raw);
      const keys = Object.keys(d);
      log('Test 6: localStorage', 'info', 'Found ' + keys.length + ' keys in localStorage backup');
    } else {
      log('Test 6: localStorage', 'info', 'No localStorage data (normal if not on admin domain)');
    }
  } catch(e) {}
}

async function testSave() {
  R.innerHTML = '';
  log('Save Test', 'info', 'Attempting to save test data via direct upsert...');

  try {
    // First try direct upsert
    const { data, error } = await sb.from('site_content').upsert({
      id: 1,
      data: { '_diag_test': 'works_' + Date.now() }
    }, { onConflict: 'id' });

    if (error) {
      log('Direct Upsert', 'fail', 'Error: ' + JSON.stringify(error) + '<br><br>This means RLS blocks anonymous writes. The RPC function must work for saves.');

      // Check if RPC exists by trying it
      log('Trying RPC...', 'info', 'Testing save_site_content RPC...');
      const { data: d2, error: e2 } = await sb.rpc('save_site_content', {
        admin_id: '00000000-0000-0000-0000-000000000000',
        content: { '_diag_test': 'rpc_' + Date.now() }
      });
      if (e2) {
        if (e2.message.includes('does not exist') || e2.code === '42883') {
          log('RPC Result', 'fail', '<b>FOUND THE PROBLEM!</b><br><br>The function save_site_content does NOT exist in Supabase.<br>You need to run the SQL to create it.<br><br>Error: ' + e2.message);
        } else {
          log('RPC Result', 'warn', 'RPC exists but returned: ' + JSON.stringify(e2));
        }
      } else {
        log('RPC Result', 'pass', 'RPC works: ' + JSON.stringify(d2));
      }
    } else {
      log('Direct Upsert', 'pass', 'Saved successfully!');
    }
  } catch(e) {
    log('Save Test', 'fail', 'Error: ' + e.message);
  }
}

async function showStoredData() {
  R.innerHTML = '';
  try {
    const { data, error } = await sb.from('site_content').select('*').eq('id', 1).single();
    if (error) {
      log('Data', 'fail', JSON.stringify(error));
    } else if (data && data.data) {
      const d = data.data;
      const keys = Object.keys(d).sort();

      // Group by prefix
      var groups = {};
      keys.forEach(function(k) {
        var prefix = k.split('.')[0];
        if (!groups[prefix]) groups[prefix] = [];
        groups[prefix].push(k);
      });

      var html = '';
      Object.keys(groups).sort().forEach(function(g) {
        html += '<b style="color:#00b4d8;">' + g + '</b> (' + groups[g].length + ' keys)<br>';
        groups[g].forEach(function(k) {
          var v = d[k];
          if (typeof v === 'string' && v.length > 80) v = v.substring(0, 80) + '...';
          html += '  ' + k + ' = <span style="color:#22c55e;">' + JSON.stringify(v) + '</span><br>';
        });
        html += '<br>';
      });

      log('Stored Data (' + keys.length + ' keys)', 'info', '<pre style="max-height:500px;">' + html + '</pre>');
    } else {
      log('Data', 'warn', 'No data in row id=1');
    }
  } catch(e) {
    log('Error', 'fail', e.message);
  }
}

// Auto-run
runAll();
</script>
</body>
</html>
